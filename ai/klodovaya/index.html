<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Клодовая ИИ — Рюкзак v5.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@700&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --accent: #ff8c00; --bg: #02050a; }
        html, body { min-height: 100%; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--neon); letter-spacing: 3px; margin: 10px 0 5px; font-size: 1.6em; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        
        .module-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 8px; padding: 15px 25px; cursor: pointer; transition: 0.3s; }
        .module-card:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }

        .tool-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.97); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .tool-content { background: #05070a; padding: 25px; border-radius: 20px; width: 95%; max-width: 1000px; border: 1px solid var(--accent); position: relative; text-align: center; max-height: 95vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; opacity: 0.5; }

        #drop-zone { border: 2px dashed rgba(255, 140, 0, 0.3); padding: 20px; border-radius: 12px; margin-bottom: 20px; background: rgba(255, 140, 0, 0.02); cursor: pointer; color: #666; }
        
        .controls-panel { display: none; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); flex-direction: column; gap: 12px; }
        .panel-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: flex-end; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .control-group label { font-size: 0.65em; color: #888; text-transform: uppercase; }
        
        input[type="range"] { width: 90px; accent-color: var(--accent); }
        input[type="text"] { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 6px; border-radius: 4px; width: 140px; font-size: 0.8em; outline: none; }
        select { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 6px; border-radius: 4px; font-size: 0.8em; }

        .pos-btns { display: flex; gap: 2px; }
        .pos-btn { background: #111; border: 1px solid #333; color: #666; padding: 3px 8px; cursor: pointer; font-size: 0.7em; font-weight: bold; }
        .pos-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        canvas { width: 100%; border-radius: 8px; display: none; margin-top: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 35px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>КЛОДОВАЯ ИИ</h1>

    <div class="module-card" onclick="document.getElementById('cover-tool').style.display='flex'">
        <h3>МАСТЕР ОБЛОЖЕК v5.7</h3>
        <p>Рамка "Троечка" • Настройка толщины (1-7) • Рукописный шрифт</p>
    </div>

    <div id="cover-tool" class="tool-overlay">
        <div class="tool-content">
            <span class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">ВЫБЕРИ ФОТО</div>
            <input type="file" id="file-input" accept="image/*" style="display:none;">

            <div id="controls" class="controls-panel">
                <div class="panel-row">
                    <div class="control-group"><label>Цвет</label><input type="color" id="inColor" value="#ff8c00"></div>
                    <div class="control-group">
                        <label>Толщина рамки</label>
                        <select id="border-weight">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                        </select>
                    </div>
                    <div class="control-group"><label>Блюр фона</label><input type="range" id="inBlur" min="0" max="100" value="45"></div>
                    <div class="control-group"><label>Тень (Размытие)</label><input type="range" id="inShBlur" min="0" max="150" value="40"></div>
                </div>

                <div class="panel-row" style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px;">
                    <input type="text" id="t1-val" placeholder="Основной текст">
                    <select id="t1-font">
                        <option value="sans-serif">Строгий</option>
                        <option value="Caveat">Рукописный (Рус)</option>
                        <option value="Montserrat">Montserrat</option>
                    </select>
                    <div class="control-group"><label>Размер</label><input type="range" id="t1-size" min="20" max="180" value="90"></div>
                    <div class="control-group"><label>Высота</label><input type="range" id="t1-y" min="0" max="100" value="85"></div>
                    <div class="pos-btns" id="t1-pos">
                        <div class="pos-btn" data-pos="left">L</div>
                        <div class="pos-btn active" data-pos="center">C</div>
                        <div class="pos-btn" data-pos="right">R</div>
                    </div>
                </div>

                <div class="panel-row" style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px;">
                    <input type="text" id="t2-val" placeholder="Подзаголовок">
                    <select id="t2-font">
                        <option value="sans-serif">Строгий</option>
                        <option value="Caveat">Рукописный (Рус)</option>
                    </select>
                    <div class="control-group"><label>Размер</label><input type="range" id="t2-size" min="20" max="150" value="50"></div>
                    <div class="control-group"><label>Высота</label><input type="range" id="t2-y" min="0" max="100" value="94"></div>
                    <div class="pos-btns" id="t2-pos">
                        <div class="pos-btn" data-pos="left">L</div>
                        <div class="pos-btn active" data-pos="center">C</div>
                        <div class="pos-btn" data-pos="right">R</div>
                    </div>
                </div>
            </div>
            
            <canvas id="canvas"></canvas>
            <button id="download-btn" class="btn" style="display:none;">СОХРАНИТЬ</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let currentImg = null;
    let t1Align = 'center', t2Align = 'center';

    document.querySelectorAll('.pos-btns').forEach(container => {
        container.onclick = (e) => {
            if(!e.target.classList.contains('pos-btn')) return;
            container.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            if(container.id === 't1-pos') t1Align = e.target.dataset.pos;
            else t2Align = e.target.dataset.pos;
            draw();
        }
    });

    document.getElementById('file-input').onchange = (e) => handleFile(e.target.files[0]);
    document.querySelectorAll('input, select').forEach(el => el.oninput = () => draw());

    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => { currentImg = img; draw(); document.getElementById('controls').style.display = 'flex'; };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function draw() {
        if(!currentImg) return;
        canvas.width = 1920; canvas.height = 1080; canvas.style.display = 'block';

        const img = currentImg;
        const sourceSize = Math.min(img.width, img.height);
        const sourceX = (img.width - sourceSize) / 2;
        const sourceY = (img.height - sourceSize) / 2;

        // 1. Фон
        ctx.save();
        ctx.filter = `blur(${document.getElementById('inBlur').value}px) brightness(0.8)`;
        ctx.drawImage(img, sourceX, sourceY, sourceSize, sourceSize, -100, -100, 2120, 1280);
        ctx.restore();

        const margin = 60; 
        const boxSize = 1080 - (margin * 2); 
        const x = (1920 - boxSize) / 2;
        const y = margin;
        const round = 70;

        // 2. Тень
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.85)';
        ctx.shadowBlur = document.getElementById('inShBlur').value;
        ctx.shadowOffsetY = 30;
        ctx.beginPath(); ctx.roundRect(x, y, boxSize, boxSize, round); ctx.fill();
        ctx.restore();

        // 3. Картинка
        ctx.save();
        ctx.beginPath(); ctx.roundRect(x, y, boxSize, boxSize, round); ctx.clip();
        const s = Math.max(boxSize / img.width, boxSize / img.height);
        ctx.drawImage(img, x + (boxSize - img.width * s) / 2, y + (boxSize - img.height * s) / 2, img.width * s, img.height * s);
        ctx.restore();

        // 4. РАМКА (Берем значение из списка)
        ctx.save();
        ctx.beginPath(); ctx.roundRect(x, y, boxSize, boxSize, round);
        ctx.lineWidth = parseInt(document.getElementById('border-weight').value);
        ctx.strokeStyle = document.getElementById('inColor').value;
        ctx.stroke();
        ctx.restore();

        renderText('t1', t1Align, x, boxSize);
        renderText('t2', t2Align, x, boxSize);

        document.getElementById('download-btn').style.display = 'inline-block';
        document.getElementById('download-btn').onclick = () => {
            const link = document.createElement('a');
            link.download = `zhekoss_v5.7.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    }

    function renderText(id, align, sqX, sqSize) {
        const val = document.getElementById(id + '-val').value;
        if(!val) return;
        const size = document.getElementById(id + '-size').value;
        const font = document.getElementById(id + '-font').value;
        const yPerc = document.getElementById(id + '-y').value;
        
        ctx.save();
        ctx.font = `bold ${size}px ${font}`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "rgba(0,0,0,0.9)"; ctx.shadowBlur = 15;

        let tx = 1920 / 2;
        ctx.textAlign = 'center';
        if(align === 'left') { ctx.textAlign = 'left'; tx = sqX + 45; }
        if(align === 'right') { ctx.textAlign = 'right'; tx = sqX + sqSize - 45; }

        ctx.fillText(val.toUpperCase(), tx, (1080 * yPerc) / 100);
        ctx.restore();
    }
</script>
</body>
</html>
