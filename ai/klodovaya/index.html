<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Клодовая ИИ — Рюкзак v4.0</title>
    <style>
        :root {
            --neon: #00f2ff;
            --accent: #ff8c00;
            --bg: #02050a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: var(--neon); 
            letter-spacing: 3px; 
            margin: 10px 0 5px 0;
            font-size: 1.6em;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .hub-description { color: #444; margin-bottom: 25px; font-size: 0.8em; text-transform: uppercase; }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1000px;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 8px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .module-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.2);
        }

        .module-card h3 { margin: 0; color: var(--accent); font-size: 0.9em; }
        .module-card p { margin: 3px 0 0 0; color: #666; font-size: 0.7em; }

        /* Инструмент */
        .tool-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .tool-content {
            background: #05070a;
            padding: 30px;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
            border: 1px solid var(--accent);
            position: relative;
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; opacity: 0.5; }
        .close-btn:hover { opacity: 1; }

        #drop-zone {
            border: 2px dashed rgba(255, 140, 0, 0.3);
            padding: 25px; border-radius: 12px; margin-bottom: 20px;
            background: rgba(255, 140, 0, 0.02);
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }
        #drop-zone:hover { border-color: var(--accent); background: rgba(255, 140, 0, 0.05); color: #aaa; }

        .controls-panel {
            display: none;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            min-width: 140px;
        }
        
        .control-group label { font-size: 0.65em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="range"] { width: 120px; cursor: pointer; accent-color: var(--accent); }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        input[type="text"] { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            color: #fff; 
            padding: 8px; 
            border-radius: 5px; 
            width: 180px;
            font-size: 0.8em;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        canvas { width: 100%; border-radius: 8px; display: none; margin-top: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        .btn {
            background: var(--accent); color: #fff; border: none;
            padding: 12px 40px; border-radius: 6px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; margin-top: 20px; transition: 0.3s;
            letter-spacing: 1px;
        }
        .btn:hover { background: #ffaa00; transform: scale(1.05); }

        #file-input { display: none; }
    </style>
</head>
<body>

    <h1>КЛОДОВАЯ ИИ</h1>
    <p class="hub-description">System Interface v4.0</p>

    <div class="hub-grid">
        <div class="module-card" onclick="openTool('cover-tool')">
            <h3>МАСТЕР ОБЛОЖЕК</h3>
            <p>16:9 • Блюр • Жесткие тени • Текст</p>
        </div>
        <div class="module-card" onclick="location.href='ai.html'">
            <h3>РАЗУМ (AI)</h3>
            <p>Прямой доступ к ядру</p>
        </div>
        <div class="module-card"><h3>АРХИВ</h3><p>История ремиксов</p></div>
    </div>

    <div id="cover-tool" class="tool-overlay">
        <div class="tool-content">
            <span class="close-btn" onclick="closeTool('cover-tool')">&times;</span>
            <h2 style="color: var(--accent); font-size: 1.2em; margin-bottom: 20px; letter-spacing: 2px;">RENDER ENGINE v4.0</h2>
            
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                ПЕРЕТАЩИ СЮДА ИСХОДНИК ИЛИ НАЖМИ ДЛЯ ВЫБОРА
            </div>
            <input type="file" id="file-input" accept="image/*">

            <div id="controls" class="controls-panel" style="display: none;">
                <div class="control-group">
                    <label>Цвет рамки</label>
                    <input type="color" id="border-color" value="#ff8c00">
                </div>
                <div class="control-group">
                    <label>Прозрачность</label>
                    <input type="range" id="border-opacity" min="0" max="1" step="0.05" value="0.9">
                </div>
                <div class="control-group">
                    <label>Блюр фона</label>
                    <input type="range" id="blur-val" min="0" max="100" step="1" value="45">
                </div>
                <div class="control-group">
                    <label>Размытие тени</label>
                    <input type="range" id="sh-blur" min="0" max="150" step="2" value="40">
                </div>
                <div class="control-group">
                    <label>Смещение тени</label>
                    <input type="range" id="sh-offset" min="0" max="120" step="2" value="30">
                </div>
                <div class="control-group">
                    <label>Надпись (Remix)</label>
                    <input type="text" id="cover-text" placeholder="Название ремикса...">
                </div>
            </div>
            
            <canvas id="canvas"></canvas>
            <button id="download-btn" class="btn" style="display:none;">СОХРАНИТЬ РЕЗУЛЬТАТ</button>
        </div>
    </div>

<script>
    function openTool(id) { document.getElementById(id).style.display = 'flex'; }
    function closeTool(id) { document.getElementById(id).style.display = 'none'; }

    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const controls = document.getElementById('controls');
    
    // Элементы управления
    const inColor = document.getElementById('border-color');
    const inOpacity = document.getElementById('border-opacity');
    const inBlur = document.getElementById('blur-val');
    const inShBlur = document.getElementById('sh-blur');
    const inShOffset = document.getElementById('sh-offset');
    const inText = document.getElementById('cover-text');

    let currentImg = null;

    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "#00f2ff"; };
    dropZone.ondragleave = (e) => { dropZone.style.borderColor = "rgba(255, 140, 0, 0.3)"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

    // Живое обновление при кручении ползунков
    [inColor, inOpacity, inBlur, inShBlur, inShOffset, inText].forEach(el => {
        el.oninput = () => { if(currentImg) draw(currentImg); };
    });

    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                currentImg = img;
                autoDetectColor(img);
                draw(img);
                controls.style.display = 'flex';
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function autoDetectColor(img) {
        const tempC = document.createElement('canvas');
        tempC.width = 1; tempC.height = 1;
        const tempCtx = tempC.getContext('2d');
        tempCtx.drawImage(img, img.width/2, img.height/2, 1, 1, 0, 0, 1, 1);
        const p = tempCtx.getImageData(0, 0, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1);
        inColor.value = hex;
    }

    function hexToRgb(hex, opacity) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
    }

    function draw(img) {
        // Формат 16:9
        canvas.width = 1920; canvas.height = 1080;
        canvas.style.display = 'block';

        const sourceSize = Math.min(img.width, img.height);
        const sourceX = (img.width - sourceSize) / 2;
        const sourceY = (img.height - sourceSize) / 2;

        // 1. Задний план (Блюр)
        ctx.save();
        ctx.filter = `blur(${inBlur.value}px) brightness(0.8)`; 
        ctx.drawImage(img, sourceX, sourceY, sourceSize, sourceSize, -100, -100, 2120, 1280);
        ctx.restore();

        const margin = 60; 
        const boxSize = 1080 - (margin * 2); 
        const x = (1920 - boxSize) / 2;
        const y = margin;

        // 2. Слой Тени (отдельно для контроля жесткости)
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.85)';
        ctx.shadowBlur = inShBlur.value;
        ctx.shadowOffsetY = inShOffset.value;
        ctx.beginPath();
        ctx.roundRect(x, y, boxSize, boxSize, 70);
        ctx.fill(); // Рисуем невидимую подложку для тени
        ctx.restore();

        // 3. Рамка
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(x, y, boxSize, boxSize, 70); 
        ctx.lineWidth = 16;
        ctx.strokeStyle = hexToRgb(inColor.value, inOpacity.value);
        ctx.stroke();
        ctx.restore();

        // 4. Основная картинка (внутри рамки)
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(x, y, boxSize, boxSize, 70);
        ctx.clip();
        const s = Math.max(boxSize / img.width, boxSize / img.height);
        ctx.drawImage(img, x + (boxSize - img.width * s) / 2, y + (boxSize - img.height * s) / 2, img.width * s, img.height * s);
        ctx.restore();

        // 5. Текст (Заглавными, по центру снизу)
        if (inText.value) {
            ctx.save();
            ctx.font = "bold 90px sans-serif";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0,0,0,0.9)";
            ctx.shadowBlur = 20;
            ctx.fillText(inText.value.toUpperCase(), 1920 / 2, 1010);
            ctx.restore();
        }

        downloadBtn.style.display = 'inline-block';
        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `zhekoss_v4_result.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        };
    }
</script>
</body>
</html>
