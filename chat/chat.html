<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANUM — Z-VOICE EDITION</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #050505; color: #d4af37; font-family: 'Georgia', serif; margin: 0; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle, #1a0a2a 0%, #050505 100%); overflow: hidden;
        }

        #terminal {
            display: flex; width: 98%; height: 94vh;
            background: rgba(10, 5, 15, 0.98); border: 1px solid #d4af3733;
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.2); border-radius: 12px; overflow: hidden;
            position: relative;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        #side-panel {
            width: 300px; border-right: 1px solid #2a1a3a;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; background: rgba(15, 10, 25, 0.9); gap: 15px; z-index: 20;
        }
        .rune-glow { 
            font-size: 50px; color: #d4af37; text-shadow: 0 0 20px #d4af37; 
            animation: blink 4s infinite; cursor: pointer; transition: 0.3s;
        }
        .selena-active { color: #00f2ff !important; text-shadow: 0 0 30px #00f2ff !important; animation: pulse-cyan 1.5s infinite !important; }
        @keyframes pulse-cyan { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.7; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .avatar-circle {
            width: 120px; height: 120px; border: 3px solid #d4af37; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 55px;
            background: rgba(10, 5, 15, 0.6);
        }

        .magic-btn {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #2a1a3a;
            color: #8a7fb9; padding: 12px; cursor: pointer; font-size: 11px; 
            text-transform: uppercase; border-radius: 20px; transition: 0.4s;
        }

        /* ЧАТ */
        #chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; background: url('assets/img/fon.jpg.jpg') center/cover; }
        #dark-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0.5; pointer-events: none; z-index: 1; }
        #log { flex-grow: 1; overflow-y: auto; padding: 35px; display: flex; flex-direction: column; gap: 20px; z-index: 5; }
        
        .entry { background: rgba(15, 5, 25, 0.7); padding: 15px 20px; border-left: 2px solid #d4af37; align-self: flex-start; border-radius: 4px; max-width: 80%; font-size: 20px; backdrop-filter: blur(8px); }
        .entry.mine { align-self: flex-end; border-left: none; border-right: 2px solid #8a7fb9; background: rgba(30, 10, 50, 0.6); }

        #input-zone { padding: 30px; border-top: 1px solid #2a1a3a; background: rgba(5, 5, 5, 0.9); z-index: 10; }
        .input-row { display: flex; gap: 20px; }
        input[type="text"]#user-msg { background: rgba(0,0,0,0.5); border: 1px solid #2a1a3a; color: #d4af37; padding: 15px 25px; flex-grow: 1; font-size: 18px; outline: none; border-radius: 30px; }
        .send-btn-magic { background: none; border: 2px solid #d4af37; color: #d4af37; padding: 10px 30px; cursor: pointer; border-radius: 50px; font-weight: bold; }

        /* HUD ИЗ v13.8 */
        #z-hud { position: fixed; top: 20px; right: 50%; transform: translateX(50%); background: rgba(0,0,0,0.9); color: #00f2ff; padding: 8px 20px; border-radius: 20px; display: none; align-items: center; z-index: 10000; border: 1px solid #00f2ff; font-family: sans-serif; box-shadow: 0 0 15px #00f2ff44; }
        #z-info { position: fixed; top: 80px; right: 20px; width: 260px; background: rgba(15,15,15,0.98); color: #fff; padding: 15px; border-radius: 15px; display: none; z-index: 10001; border: 1px solid #00f2ff; font-family: sans-serif; box-shadow: 0 0 20px rgba(0,242,255,0.3); backdrop-filter: blur(10px); }
        @keyframes blink-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="z-hud"><span style="color:red; margin-right:8px; animation: blink-red 1s infinite;">●</span> <span id="z-txt">СЕЛЕНА: СЛУШАЮ</span></div>
<div id="z-info">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;"><b style="color:#00f2ff">ГОЛОСОВЫЕ КОМАНДЫ</b><span id="close-z" style="cursor:pointer; color:#ff4444;">✖</span></div>
    <div style="font-size:13px; line-height:1.6;">
        <span style="color:#ffcc00">• <b>СТОП / ПАУЗА / РАБОТАЙ</b></span><br>
        • <b>ТОЧКА / ЗАПЯТАЯ / ВОПРОС</b><br>
        • <b>ЗНАК / УРА / АБЗАЦ</b><br>
        • <b>ЛАЙК / ОГОНЬ / СМАЙЛ</b><br>
        <span style="color:#ffcc00">• <b>СТИРАЙ ВСЁ / ЖУКОВ ОТПРАВЬ</b></span>
    </div>
</div>
<div id="z-help" style="position:fixed; bottom:20px; right:20px; width:40px; height:40px; background:rgba(0,0,0,0.8); color:#00f2ff; border:1px solid #00f2ff; border-radius:50%; display:none; align-items:center; justify-content:center; cursor:pointer; z-index:10003; font-weight:bold;">?</div>

<div id="terminal">
    <div id="side-panel">
        <div class="rune-glow" id="selena-trigger" title="Нажми и выбери поле ввода">ᛟ</div>
        <div class="avatar-circle" id="dynamic-avatar">?</div>
        <div id="display-nick">МАГ</div>
        <button class="magic-btn" onclick="document.getElementById('log').innerHTML=''" style="color:#ff4d4d;">ОЧИСТИТЬ СВИТОК</button>
        <button class="magic-btn" onclick="location.reload()" style="margin-top:auto; border-color:#d4af37;">ПЕРЕЗАГРУЗКА</button>
    </div>

    <div id="chat-area">
        <div id="dark-layer"></div>
        <div id="log"></div>
        <div id="input-zone">
            <div class="input-row">
                <input type="text" id="user-msg" placeholder="Шепни Селене..." autocomplete="off">
                <button class="send-btn-magic" onclick="send()">ИЗРЕЧЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    let myName = localStorage.getItem('arcanum_nick') || "Zhekoss";
    const ably = new Ably.Realtime({ key: 'FO1MkA.QBgrTg:OjC-PQMR4Coi4nxjLyFe84T8uKnxzl0lFkFfDPyfDYg', clientId: myName });
    const channel = ably.channels.get('arcanum_stream');

    // === ЛОГИКА v13.8 (ПЕРЕСАЖЕННАЯ) ===
    const hud = document.getElementById('z-hud');
    const infoBox = document.getElementById('z-info');
    const helpBtn = document.getElementById('z-help');
    const selenaTrigger = document.getElementById('selena-trigger');
    
    let recognition = null;
    window.isStopManual = false;
    window.isPaused = false;

    // Озвучка (Ухо)
    const synth = window.speechSynthesis;
    let earEnabled = false;
    const ear = document.createElement('div');
    ear.innerHTML = '👂';
    ear.style = "position:fixed; bottom:20px; left:20px; width:50px; height:50px; background:#1a1a1a; border:2px solid #555; border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; font-size:24px; z-index:10000; opacity:0.5;";
    document.body.appendChild(ear);
    ear.onclick = () => {
        earEnabled = !earEnabled;
        ear.style.border = earEnabled ? "2px solid #ffcc00" : "2px solid #555";
        ear.style.opacity = earEnabled ? "1" : "0.5";
        if (!earEnabled) synth.cancel();
    };

    document.addEventListener('mouseup', () => {
        if (!earEnabled) return;
        const text = window.getSelection().toString().trim();
        if (text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ru-RU';
            synth.cancel(); 
            synth.speak(utter);
        }
    });

    // Активация Z-Голоса через Руну
    selenaTrigger.onclick = () => {
        window.isStopManual = false;
        window.isPaused = false;
        document.body.style.cursor = "crosshair";
        selenaTrigger.classList.add('selena-active');
    };

    function startSelena(element) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        recognition = new Speech();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = true; 

        recognition.onstart = () => { 
            hud.style.display = "flex"; 
            helpBtn.style.display = "flex"; 
            element.focus(); 
        };

        recognition.onresult = (event) => {
            if (!event.results[event.resultIndex].isFinal) return;
            let text = event.results[event.resultIndex][0].transcript.trim();
            let lowText = text.toLowerCase();

            if (lowText.includes("стоп")) { 
                window.isStopManual = true; 
                hud.style.display = "none"; helpBtn.style.display = "none"; infoBox.style.display = "none";
                selenaTrigger.classList.remove('selena-active');
                recognition.onend = null; recognition.stop(); return; 
            }
            if (lowText.includes("пауза")) { window.isPaused = true; document.getElementById('z-txt').innerText = "ПАУЗА"; return; }
            if (lowText.includes("работай")) { window.isPaused = false; document.getElementById('z-txt').innerText = "СЕЛЕНА: СЛУШАЮ"; return; }
            if (lowText.includes("жуков") && lowText.includes("отправ")) { send(); return; }
            if (lowText.includes("стира") && lowText.includes("всё")) { element.value = ''; return; }

            if (!window.isPaused) {
                const emojiMap = { 
                    "точка": ". ", "запятая": ", ", "восклик": "! ", "ура": "! ", 
                    "знак": "! ", "вопрос": "? ", "абзац": "\n", "лайк": "👍 ", 
                    "смайл": "😊 ", "огонь": "🔥 " 
                };
                const val = emojiMap[lowText] || (text + " ");
                // Используем стандартную вставку для input
                const start = element.selectionStart;
                const end = element.selectionEnd;
                element.value = element.value.substring(0, start) + val + element.value.substring(end);
                element.selectionStart = element.selectionEnd = start + val.length;
            }
        };

        recognition.onend = () => { if (!window.isStopManual) try { recognition.start(); } catch(e) {} };
        recognition.start();
    }

    // Прицеливание
    document.addEventListener('mousedown', (e) => { 
        if (document.body.style.cursor === "crosshair") { 
            const el = e.target.closest('input, textarea'); 
            if (el) { 
                e.preventDefault(); 
                document.body.style.cursor = "default"; 
                startSelena(el); 
            } 
        } 
    }, true);

    helpBtn.onclick = () => infoBox.style.display = (infoBox.style.display === "none" ? "block" : "none");
    document.getElementById('close-z').onclick = () => infoBox.style.display = "none";

    // === ФУНКЦИИ ЧАТА ===
    function send() {
        const inp = document.getElementById('user-msg');
        if (inp.value.trim()) { 
            channel.publish('post', { u: myName, t: inp.value }); 
            inp.value = '';
        }
    }

    function addMsg(user, text) {
        const log = document.getElementById('log');
        const isMine = user === myName ? 'mine' : '';
        const div = document.createElement('div');
        div.className = `entry ${isMine}`;
        div.innerHTML = `<b>${user}</b>${text}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    channel.subscribe('post', (m) => addMsg(m.data.u, m.data.t));
    document.getElementById('user-msg').onkeypress = (e) => { if(e.keyCode == 13) send(); };
    document.getElementById('dynamic-avatar').innerText = myName.charAt(0);
    document.getElementById('display-nick').innerText = myName;

    channel.history({ limit: 15 }, (err, page) => { 
        if (!err) page.items.reverse().forEach(m => addMsg(m.data.u, m.data.t)); 
    });
</script>
</body>
</html>
