<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANUM - Магическая Связь</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #000; color: #8a2be2; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #log { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #1a1a1a; scroll-behavior: smooth; }
        #input-zone { padding: 15px; background: #050505; border-top: 1px solid #222; }
        .input-row { display: flex; align-items: center; gap: 12px; max-width: 900px; margin: 0 auto; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #8a2be2; box-shadow: 0 0 5px #8a2be2; }
        
        /* КНОПКИ */
        .send-btn-magic { background: #1a1a1a; border: 1px solid #8a2be2; color: #8a2be2; cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .send-btn-magic:hover { background: #8a2be2; color: #fff; box-shadow: 0 0 10px #8a2be2; }
        
        /* КНОПКА СЕЛЕНЫ (МИКРОФОН) */
        #selena-btn { padding: 10px 18px; font-size: 20px; }
        .selena-active { background: #8a2be2 !important; color: #fff !important; box-shadow: 0 0 20px #bf00ff; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .fs-toggle { width: 45px; height: 45px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; border-radius: 8px; font-size: 20px; }
        
        b { color: #bf00ff; text-shadow: 0 0 5px #8a2be2; }
    </style>
</head>
<body>

<div id="log"></div>

<div id="input-zone">
    <div class="input-row">
        <input type="text" id="user-msg" placeholder="Изреките волю..." autocomplete="off">
        
        <button id="selena-btn" title="Призвать Селену" class="send-btn-magic" onclick="toggleSelena()">ᛟ</button>

        <button id="btn-send" class="send-btn-magic" style="padding: 10px 25px;" onclick="send()">ИЗРЕЧЬ</button>
        
        <button class="fs-toggle" title="На весь экран" onclick="toggleFullScreen()">⛶</button>
    </div>
</div>

<script>
    // ТУТ ТВОЙ КЛЮЧ ИЗ ПРОШЛОГО КОДА (ВСТАВЬ ЕГО ВМЕСТО КАВЫЧЕК)
    const ably = new Ably.Realtime('ВСТАВЬ_СЮДА_СВОЙ_КЛЮЧ_ИЗ_ПРОШЛОГО_КОДА'); 
    const channel = ably.channels.get('arcanum-chat');
    const myName = "Zhekoss";

    function send() {
        const inp = document.getElementById('user-msg');
        let text = inp.value.trim();
        if (!text) return;

        // МАГИЧЕСКИЕ ЗАМЕНЫ (ТВОИ ЛИЧНЫЕ РУНЫ)
        text = text
            .replace(/\.\.\./g, '…')
            .replace(/:\)/g, '✧')
            .replace(/<3/g, 'ᚹ')
            .replace(/\*/g, '✦')
            .replace(/!/g, ' ! ᛟ')
            .replace(/\?/g, ' ? ᛗ');

        channel.publish('post', { u: myName, t: text });
        inp.value = '';
    }

    // ЛОГИКА ГОЛОСА (СЕЛЕНА)
    let recognition;
    let isSelenaActive = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            // Если сказал "изречь" или "отправить" - посылаем в чат
            if (result === "изречь" || result === "отправить") {
                send();
            } else {
                const currentVal = document.getElementById('user-msg').value;
                document.getElementById('user-msg').value = currentVal + (currentVal ? " " : "") + result;
            }
        };

        recognition.onerror = (event) => { console.error("Ошибка Селены: ", event.error); };
    }

    function toggleSelena() {
        const btn = document.getElementById('selena-btn');
        if (!isSelenaActive) {
            recognition.start();
            isSelenaActive = true;
            btn.classList.add('selena-active');
            console.log("Селена слушает...");
        } else {
            recognition.stop();
            isSelenaActive = false;
            btn.classList.remove('selena-active');
            console.log("Селена спит.");
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    channel.subscribe('post', (msg) => {
        const div = document.createElement('div');
        div.style.marginBottom = "10px";
        div.innerHTML = `<b>${msg.data.u}:</b> ${msg.data.t}`;
        const log = document.getElementById('log');
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    });

    // Отправка по Enter
    document.getElementById('user-msg').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') send();
    });
</script>

</body>
</html>
