<script>
    // === ЛОГИКА ГОЛОСА v14.4 (БЕЗ ИМЕН) ===
    let recognition = null;
    window.isStopManual = false;
    window.isPaused = false;
    const trigger = document.getElementById('selena-trigger');
    
    if (trigger) {
        trigger.onclick = function() {
            window.isStopManual = false;
            window.isPaused = false;
            document.body.style.cursor = "crosshair"; 
            this.classList.add('selena-active');
        };
    }

    window.startSelenaVoice = (element) => {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;
        if (recognition) { try { recognition.abort(); } catch(e) {} }
        
        recognition = new Speech();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false; // Ждем только финальный результат для скорости

        recognition.onresult = (event) => {
            let text = event.results[0][0].transcript.trim();
            let low = text.toLowerCase();

            // 1. КОМАНДА ОТПРАВКИ (Самая приоритетная)
            if (low.includes("отправ") || low.includes("изречь")) {
                window.send(); 
                return; 
            }

            // 2. СТОП / ЗАМРИ
            if (low.includes("стоп") || low.includes("замри")) { 
                window.isStopManual = true; 
                trigger.classList.remove('selena-active');
                document.body.style.cursor = "default";
                recognition.abort(); 
                return; 
            }

            // 3. ПАУЗА / РАБОТАЙ / СТИРАЙ
            if (low.includes("пауза")) { window.isPaused = true; return; }
            if (low.includes("работай")) { window.isPaused = false; return; }
            if (low.includes("стирай")) { element.value = ''; return; }

            // 4. ЗАПИСЬ ТЕКСТА
            if (!window.isPaused) {
                if (low === "абзац") { element.value += "\n"; return; }
                
                const emojiMap = { "точка": ". ", "запятая": ", ", "восклик": "! ", "вопрос": "? " };
                let finalAdd = emojiMap[low] || (text + " ");
                element.value += finalAdd;
            }
        };

        recognition.onend = () => { 
            if (!window.isStopManual) {
                setTimeout(() => { 
                    try { if(!window.isStopManual) recognition.start(); } catch(e) {} 
                }, 50); // Ускорил перезапуск до 50мс
            }
        };
        recognition.start();
    };

    // Вешаем запуск на клик по полю после активации руны
    document.addEventListener('mousedown', (e) => { 
        if (document.body.style.cursor === "crosshair") { 
            const el = e.target.closest('input[type="text"]'); 
            if (el) { 
                e.preventDefault(); 
                document.body.style.cursor = "default"; 
                window.startSelenaVoice(el); 
            } 
        } 
    }, true);
</script>
