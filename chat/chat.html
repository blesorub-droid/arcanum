<script>
    let myName = localStorage.getItem('arcanum_nick') || "Маг";
    let myExp = parseInt(localStorage.getItem('arcanum_exp')) || 0;
    const ably = new Ably.Realtime({ key: 'FO1MkA.QBgrTg:OjC-PQMR4Coi4nxjLyFe84T8uKnxzl0lFkFfDPyfDYg', clientId: myName });
    const channel = ably.channels.get('arcanum_stream');

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.getElementById('terminal').requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    const runeMap = {"а":"ᚫ","б":"ᛒ","в":"ᚠ","г":"ᚷ","д":"ᛞ","е":"ᛖ","ж":"ᛉ","з":"ᛈ","и":"ᛁ","й":"ᛁ","к":"ᚲ","л":"ᛚ","м":"ᛗ","н":"ᚾ","о":"ᛟ","п":"ᛠ","р":"ᚱ","с":"ᛊ","т":"ᛏ","у":"ᚢ","ф":"ᚠ","х":"ᚻ","ц":"ᛃ","ч":"ᚳ","ш":"ᛘ","щ":"ᛘ","ъ":"ᛁ","ы":"ᚤ","ь":"ᛁ","э":"ᛖ","ю":"ᚣ","я":"ᛄ"," ":"  "};
    function toRunes(text) { return text.toLowerCase().split('').map(char => runeMap[char] || char).join(''); }

    function toggleShadow() {
        document.body.classList.toggle('shadow-active');
        const isActive = document.body.classList.contains('shadow-active');
        document.getElementById('shadow-btn').innerText = isActive ? "ПРОЯВИТЬ СУТЬ" : "ОБЛЕЧЬ В ТЕНЬ";
        document.querySelectorAll('.msg-content').forEach(span => {
            const original = span.getAttribute('data-original');
            span.innerText = isActive ? toRunes(original) : original;
        });
    }

    function updatePresence() {
        channel.presence.get((err, members) => {
            if (!err) {
                document.getElementById('online-count-num').innerText = members.length;
                document.getElementById('presence-users').innerHTML = members.map(m => `<div style="color:#8a7fb9; font-size:12px; padding:5px; border-bottom:1px solid #2a1a3a;">✧ ${m.clientId}</div>`).join('');
            }
        });
    }

    function addMsg(user, text) {
        const log = document.getElementById('log');
        const isMine = user === myName ? 'mine' : '';
        const isActive = document.body.classList.contains('shadow-active');
        const displayText = isActive ? toRunes(text) : text;
        const div = document.createElement('div');
        div.className = `entry ${isMine}`;
        div.innerHTML = `<b>${user}</b><span class="msg-content" data-original="${text}">${displayText}</span>`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function send() {
        const inp = document.getElementById('user-msg');
        if (inp.value.trim()) { 
            channel.publish('post', { u: myName, t: inp.value }); 
            inp.value = '';
            myExp += 1; localStorage.setItem('arcanum_exp', myExp); updateProfile();
        }
    }

    function updateProfile() {
        document.getElementById('dynamic-avatar').innerText = myName.charAt(0);
        document.getElementById('display-nick').innerText = myName;
        document.getElementById('lvl-display').innerText = "LEVEL " + Math.floor(myExp / 10);
    }

    function saveNewNick(v) { if(v.trim()){ localStorage.setItem('arcanum_nick', v.trim()); location.reload(); } }
    function loadHistory() { channel.history({ limit: 40 }, (err, page) => { if (!err) page.items.reverse().forEach(m => addMsg(m.data.u, m.data.t)); }); }
    function toggleCallMenu() { const menu = document.getElementById('call-overlay'); menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex'; }
    function endCall() { location.reload(); }

    channel.subscribe('post', (m) => addMsg(m.data.u, m.data.t));
    channel.presence.subscribe('enter', updatePresence);
    channel.presence.subscribe('leave', updatePresence);
    channel.presence.enter();
    document.getElementById('user-msg').onkeypress = (e) => { if(e.keyCode == 13) send(); };
    
    setInterval(() => {
        const container = document.getElementById('canvas-runes');
        if(!container) return;
        const rune = document.createElement('div');
        rune.className = 'floating-rune';
        const runesList = ["ᛟ","ᚫ","ᛒ","ᚠ","ᚷ","ᛞ","ᛖ","ᛉ","ᛈ","ᛁ","ᚲ","ᛚ","ᛗ","ᚾ","ᚱ","ᛊ","ᛏ","ᚢ"];
        rune.innerText = runesList[Math.floor(Math.random() * runesList.length)];
        rune.style.left = Math.random() * 95 + '%';
        rune.style.top = Math.random() * 95 + '%';
        container.appendChild(rune);
        setTimeout(() => rune.remove(), 8000);
    }, 2000);

    // === СЕЛЕНА LOGIC v13.9 (FIXED) ===
    let recognition = null;
    window.isStopManual = false;
    window.isPaused = false;

    document.getElementById('selena-trigger').onclick = function() {
        window.isStopManual = false;
        window.isPaused = false;
        document.body.style.cursor = "crosshair"; 
        this.classList.add('selena-active');
    };

    function startSelenaVoice(element) {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        
        recognition = new Speech();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = true; 

        recognition.onstart = () => { element.focus(); };

        recognition.onresult = (event) => {
            if (!event.results[event.resultIndex].isFinal) return;
            let text = event.results[event.resultIndex][0].transcript.trim();
            let lowText = text.toLowerCase();

            // КОМАНДА ОТКЛЮЧЕНИЯ
            if (lowText.includes("стоп") || lowText.includes("замри") || lowText.includes("хватит")) { 
                window.isStopManual = true; 
                document.getElementById('selena-trigger').classList.remove('selena-active');
                document.body.style.cursor = "default";
                recognition.onend = null; 
                recognition.stop(); 
                return; 
            }

            if (lowText.includes("пауза")) { window.isPaused = true; return; }
            if (lowText.includes("работай")) { window.isPaused = false; return; }
            
            // КОМАНДА ОТПРАВКИ (ФИКС)
            if (lowText.includes("селена") && (lowText.includes("отправ") || lowText.includes("изреки"))) { 
                send(); 
                return; 
            }
            
            if (lowText.includes("стирай") && lowText.includes("всё")) { element.value = ''; return; }

            if (!window.isPaused) {
                const emojiMap = { "точка": ". ", "запятая": ", ", "восклик": "! ", "ура": "! ", "знак": "! ", "вопрос": "? ", "абзац": "\n", "лайк": "👍 ", "смайл": "😊 ", "огонь": "🔥 " };
                const val = emojiMap[lowText] || (text + " ");
                const start = element.selectionStart;
                element.value = element.value.substring(0, start) + val + element.value.substring(element.selectionEnd);
                element.selectionStart = element.selectionEnd = start + val.length;
            }
        };

        recognition.onend = () => { if (!window.isStopManual) try { recognition.start(); } catch(e) {} };
        recognition.start();
    }

    document.addEventListener('mousedown', (e) => { 
        if (document.body.style.cursor === "crosshair") { 
            const el = e.target.closest('input[type="text"]'); 
            if (el) { 
                e.preventDefault(); 
                document.body.style.cursor = "default"; 
                startSelenaVoice(el); 
            } 
        } 
    }, true);

    updateProfile(); 
    loadHistory();
</script>м
